apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: cs3219
  name: catalog-service
spec:
  selector:
    matchLabels:
      app: catalog-service
  replicas: 3 # tells deployment to run 3 pods matching the template
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      containers:
        - name: catalog-service
          image: cs3219/catalog-service:1.0.0
          ports:
            - containerPort: 4000
