apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: cs3219
  name: order-service
spec:
  selector:
    matchLabels:
      app: order-service
  replicas: 3 # tells deployment to run 3 pods matching the template
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: cs3219/order-service:1.0.0
          ports:
            - containerPort: 5000
