apiVersion: v1
kind: Service
metadata:
  namespace: cs3219
  name: api-gateway
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    # By default and for convenience, the `targetPort` is set to the same value as the `port` field.
    - protocol: TCP
      port: 8080
      targetPort: 8080
  clusterIP: 10.96.152.14
