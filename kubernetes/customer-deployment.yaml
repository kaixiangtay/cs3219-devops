apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: cs3219
  name: customer-service
spec:
  selector:
    matchLabels:
      app: customer-service
  replicas: 3 # tells deployment to run 3 pods matching the template
  template:
    metadata:
      labels:
        app: customer-service
    spec:
      containers:
        - name: customer-service
          image: cs3219/customer-service:1.0.0
          ports:
            - containerPort: 6000
